<!DOCTYPE html>
<html>
<head>
    <title>For You Anuskha ❤️</title>
   <style>
    body {
        background: url("c:\Users\User\Desktop\New folder\605626792_845940878355381_4533542742309438507_n.webp");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 100px;
    }

    .card {
        background: rgba(255, 255, 255, 0.85);
        padding: 40px;
        margin: auto;
        width: 60%;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

        h1 {
            color: #e91e63;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            margin: 10px;
            cursor: pointer;
        }

        .yes {
            background-color: #e91e63;
            color: white;
        }

        .no {
            background-color: #999;
            color: white;
        }

        .hidden-message {
            display: none;
            font-size: 20px;
            color: #e91e63;
            margin-top: 20px;
        }
    </style>

    <script>
        function sayYes() {
            document.getElementById("message").innerHTML =
                "Yayyy!! 💖 You just made me the happiest person alive!";
            document.getElementById("message").style.display = "block";
        }

        function sayNo() {
            document.getElementById("message").innerHTML =
                "No worries 😊 You will always be special to me.";
            document.getElementById("message").style.display = "block";
        }
    </script>
</head>

<body>
    <div class="card">
        <h1>Hey Beautiful ❤️</h1>
        <p>
            From the moment I saw you, my world changed.<br>
            Your smile makes my day brighter.<br>
            Your presence makes everything magical.<br><br>
            I may not be perfect, but my feelings for you are true.<br><br>
            Will you be mine forever?
        </p>

        <button class="yes" onclick="sayYes()">Yes 💖</button>
        <button class="no" onclick="sayNo()">No 😅</button>

        <div id="message" class="hidden-message"></div>
    </div>
</body>
</html>
